name: validate
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * *"
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun run scripts/validate-skills.ts
      - run: bun test scripts/
      - run: bun skills/tailrocks-tanstack-project-setup/scripts/resolve-package-versions.ts --check-template skills/tailrocks-tanstack-project-setup/templates/package.json
