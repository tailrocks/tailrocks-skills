[tools]
"cargo:cargo-nextest" = "0.9.140"
"cargo:cargo-deny" = "0.20.2"
"cargo:cargo-audit" = "0.22.2"
"cargo:cargo-shear" = "1.13.1"
"cargo:cargo-hack" = "0.6.45"
"cargo:cargo-llvm-cov" = "0.8.7"
"cargo:cargo-semver-checks" = "0.48.0"
"cargo:cargo-vet" = "0.10.2"
"cargo:cargo-mutants" = "27.1.0"
"cargo:cargo-careful" = "0.4.10"
"cargo:cargo-dylint" = "6.0.1"
"cargo:dylint-link" = "6.0.1"
cargo-binstall = "1.20.1"

[settings]
cargo.binstall = true
idiomatic_version_file_enable_tools = ["rust"]
lockfile = true

[tasks.check]
run = "cargo check --workspace --all-targets --all-features --locked"

[tasks.lint]
run = [
    "cargo fmt --check",
    "cargo clippy --workspace --all-targets --all-features --locked -- -D warnings",
]

[tasks.test]
run = [
    "cargo nextest run --workspace --all-features --locked",
    "cargo test --workspace --doc --all-features --locked",
]

[tasks.supply-chain]
run = [
    "cargo deny check advisories licenses bans sources",
    "cargo audit",
    "cargo vet",
]

[tasks.hygiene]
run = "cargo shear"

[tasks.features]
run = "cargo hack check --workspace --feature-powerset --all-targets --locked"

[tasks.coverage]
run = "cargo llvm-cov nextest --workspace --all-features --locked"

[tasks.semver]
run = "cargo semver-checks check-release --workspace"

[tasks.mutants]
run = "cargo mutants --workspace --test-tool=nextest"

[tasks.careful]
run = "cargo +nightly-2026-07-10 careful test --workspace --all-features --locked"
